<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Elegance Boutique - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Playfair Display', serif;
            background: #0d0f12;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
        }
        .lado-izquierdo {
            flex: 1;
            background: linear-gradient(rgba(13, 15, 18, 0.2), rgba(13, 15, 18, 0.7)), 
                        url('https://images.unsplash.com/photo-1539109136881-3be0616acf4b?w=1200') center/cover;
            display: none;
        }
        @media(min-width: 768px) { .lado-izquierdo { display: block; } }
        
        .lado-derecho {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        .login-box { max-width: 400px; width: 100%; text-align: center; }
        .logo-login { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #d4af37; margin-bottom: 20px; object-fit: cover; }
        h2 { font-size: 28px; letter-spacing: 3px; margin-bottom: 30px; text-transform: uppercase; color: #ffffff; }
        form { display: flex; flex-direction: column; gap: 20px; }
        input { width: 100%; padding: 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(139,115,85,0.3); color: #ffffff; border-radius: 4px; }
        input:focus { outline: none; border-color: #d4af37; }
        .btn-entrar { padding: 16px; background: #d4af37; color: #0d0f12; border: none; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-entrar:hover { background: #bfa030; }
        .registro-link { display: inline-block; margin-top: 25px; color: rgba(255,255,255,0.5); text-decoration: none; font-size: 14px; }
        .registro-link span { color: #d4af37; }
    </style>
</head>
<body>

    <!-- Lado de la Imagen de la Modelo -->
    <div class="lado-izquierdo"></div>

    <!-- Lado del Formulario -->
    <div class="lado-derecho">
        <div class="login-box">
            <img src="{{ url_for('static', filename='uploads/logo.jpg') }}" class="logo-login" alt="Logo">
            <h2>Iniciar Sesión</h2>
            
            <form action="/login" method="POST">
                <input type="email" name="correo" placeholder="Correo Electrónico" required>
                <input type="password" name="clave" placeholder="Contraseña" required>
                <button type="submit" class="btn-entrar">Ingresar al Sistema</button>
            </form>

            <a href="/registro" class="registro-link">¿No tienes cuenta? <span>Regístrate aquí</span></a>
        </div>
    </div>

</body>
</html>
