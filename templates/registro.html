<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegance - Registrar Producto</title>
    
    <link rel="shortcut icon" href="{{ url_for('static', filename='uploads/logo.jpg') }}" type="image/x-icon">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Playfair Display', 'Georgia', serif;
            background: #0d0f12; /* Fondo oscuro institucional */
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            /* Fondo sutil degradado elegante */
            background: linear-gradient(rgba(13, 15, 18, 0.9), rgba(13, 15, 18, 0.95)), 
                        url('https://images.unsplash.com/photo-1539109136881-3be0616acf4b?w=1600') center/cover;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(139, 115, 85, 0.2); /* Borde dorado sutil */
            padding: 40px;
            border-radius: 8px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        /* 🌟 CONTROL DE TAMAÑO DEL LOGO: Aquí evitamos que se haga gigante 🌟 */
        .form-logo-real {
            height: 100px; /* Tamaño controlado y elegante */
            width: 100px;
            border-radius: 50%; /* Círculo perfecto */
            background-color: #ffffff; /* Fondo blanco para que resalte el diseño negro */
            border: 2px solid #d4af37; /* Borde dorado premium */
            object-fit: cover; /* Evita que se deforme */
            display: block;
            margin: 0 auto 20px auto; /* Centrado automático */
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        h1 {
            font-size: 26px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .back-link {
            display: inline-block;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #d4af37;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 1px;
            margin-bottom: 25px;
            transition: opacity 0.3s;
        }

        .back-link:hover {
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
            opacity: 0.9;
        }

        /* Mensajes Flash de Flask */
        .alert-message {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 12px;
            font-size: 14px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #d4af37;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        button {
            width: 100%;
            padding: 15px;
            background: transparent;
            color: #d4af37;
            border: 1px solid #d4af37;
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #d4af37;
            color: #0d0f12;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <img src="{{ url_for('static', filename='uploads/logo.jpg') }}" alt="Elegancia Boutique" class="form-logo-real">

        <h1>Registrar Producto</h1>
        <a href="/" class="back-link">← Volver al inicio</a>

        {% with mensajes = get_flashed_messages() %}
            {% if mensajes %}
                {% for mensaje in mensajes %}
                    <div class="alert-message">{{ mensaje }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/guardar" method="POST">

            <input type="text" name="nombre" placeholder="Nombre del producto" required>

            <input type="number" step="0.01" name="precio" placeholder="Precio (Ej: 299.99)" required>

            <input type="number" name="stock" placeholder="Cantidad en Stock" required>

            <input type="url" name="imagen_url" placeholder="Pegar link de la imagen (URL)" required>

            <button type="submit">Guardar Producto</button>

        </form>
    </div>

</body>
</html>
